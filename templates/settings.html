<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen | Candidate Flow</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="page-wrapper">
    <div class="nav-wrapper">
      <nav class="nav">
        <a href="/" class="nav__brand">
          <img src="{{ logo_dark }}" alt="Candidate Flow Logo" class="nav__logo" width="114" height="20">
        </a>
        <div class="nav__actions">
          <a href="/" class="button button--secondary button--sm">Zurück</a>
        </div>
      </nav>
    </div>

    <section class="section section--light">
      <div class="padding-global padding-section-medium">
        <div class="container-large">
          <h1 class="heading-h2 heading-h2--dark">Einstellungen</h1>
          <p class="text-muted section__lead">LLM-API-Key verschlüsselt speichern (AES-GCM-256). Der Key wird nie im Klartext zurückgegeben.</p>
          <div class="card card--form">
            <form id="settings-form" class="analysis-form">
              <div class="analysis-form__field">
                <label for="provider" class="analysis-form__label">Provider</label>
                <select id="provider" name="provider" class="analysis-form__select">
                  <option value="openai" {% if provider == 'openai' %}selected{% endif %}>OpenAI</option>
                  <option value="anthropic" {% if provider == 'anthropic' %}selected{% endif %}>Anthropic Claude</option>
                  <option value="gemini" {% if provider == 'gemini' %}selected{% endif %}>Google Gemini</option>
                </select>
              </div>
              <div class="analysis-form__field">
                <label for="api-key" class="analysis-form__label">API-Key</label>
                <input type="password" id="api-key" name="api_key" placeholder="sk-…" autocomplete="off" required>
              </div>
              <button type="submit" class="button button--primary button--sm">Key speichern</button>
              <p id="settings-status" class="form-message" hidden></p>
              {% if configured %}
              <p class="text-muted text-small">Status: API-Key ist hinterlegt.</p>
              {% else %}
              <p class="text-muted text-small">Status: Noch kein API-Key hinterlegt. Heuristik-Fallback aktiv, falls aktiviert.</p>
              {% endif %}
            </form>
          </div>
        </div>
      </div>
    </section>
  </div>
  <script>
    const form = document.getElementById("settings-form");
    const status = document.getElementById("settings-status");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      status.hidden = true;
      const response = await fetch("/api/settings/llm-key", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider: document.getElementById("provider").value,
          api_key: document.getElementById("api-key").value,
        }),
      });
      const data = await response.json();
      status.textContent = response.ok ? "API-Key gespeichert." : (data.error || "Speichern fehlgeschlagen.");
      status.className = response.ok ? "form-message form-message--success" : "form-error";
      status.hidden = false;
      if (response.ok) document.getElementById("api-key").value = "";
    });
  </script>
</body>
</html>
