# Render Blueprint: https://render.com/docs/blueprint-spec
# Nach dem Push auf GitHub: Render Dashboard → New → Blueprint → Repo auswählen
services:
  - type: web
    name: candidate-flow-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 --capture-output --log-level info
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: LLM_PROVIDER
        value: bedrock
      - key: USE_HEURISTIC_FALLBACK
        value: "false"
      - key: JOB_TIMEOUT_SECONDS
        value: "240"
      # Optional: Headless-Browser-Fallback für SPAs (Build: playwright install chromium)
      # - key: USE_PLAYWRIGHT_FALLBACK
      #   value: "true"
      # - key: PLAYWRIGHT_TIMEOUT_SECONDS
      #   value: "25"
      - key: AWS_BEDROCK_REGION
        value: "eu-north-1"
      - key: AWS_BEDROCK_MODEL_ID
        value: "eu.anthropic.claude-haiku-4-5-20251001-v1:0"
      # Im Render-Dashboard setzen (sync: false = Secret, nicht aus Repo):
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AWS_BEARER_TOKEN_BEDROCK
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Optional:
      # - EMAIL_PROVIDER (Standard: auto → Brevo wenn BREVO_API_KEY gesetzt)
      # - RESEND_API_KEY (nur mit eigener Domain)
      # - MASTER_ENCRYPTION_KEY
