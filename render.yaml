# Render Blueprint: https://render.com/docs/blueprint-spec
# Nach dem Push auf GitHub: Render Dashboard → New → Blueprint → Repo auswählen
services:
  - type: web
    name: candidate-flow-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: LLM_PROVIDER
        value: bedrock
      - key: USE_HEURISTIC_FALLBACK
        value: "false"
      - key: JOB_TIMEOUT_SECONDS
        value: "240"
      - key: AWS_BEDROCK_REGION
        value: "eu-north-1"
      - key: AWS_BEDROCK_MODEL_ID
        value: "eu.anthropic.claude-3-5-haiku-20241022-v1:0"
      # Secret nur im Render-Dashboard setzen (nicht ins Repo):
      # - AWS_BEARER_TOKEN_BEDROCK=ABSK...
      # Optional: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, MASTER_ENCRYPTION_KEY
